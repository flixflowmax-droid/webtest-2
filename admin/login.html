<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - LUXE FASHION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; }
        .lux-bg { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen lux-bg">

    <div class="w-full max-w-sm bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700">
        <div class="text-center mb-8">
            <i class="fa-solid fa-gem text-3xl text-purple-500 mb-3"></i>
            <h1 class="text-2xl font-bold tracking-tight">LUXE FASHION</h1>
            <p class="text-sm text-slate-400 mt-1">Admin Control Panel</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">Username</label>
                <input type="text" id="username" class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded-md focus:outline-none focus:border-purple-500 text-white placeholder-slate-500" placeholder="admin" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded-md focus:outline-none focus:border-purple-500 text-white placeholder-slate-500" placeholder="admin123" required>
            </div>

            <div id="errorMsg" class="text-red-400 text-sm hidden bg-red-900/30 p-2 rounded">
                Invalid credentials.
            </div>

            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-medium py-2 px-4 rounded-md transition-colors flex items-center justify-center gap-2">
                <span>Login Securely</span>
                <i class="fa-solid fa-arrow-right text-xs"></i>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('errorMsg');
            
            try {
                const res = await fetch('api/auth.php?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                
                const data = await res.json();
                if (data.success) {
                    window.location.href = 'index.html';
                } else {
                    err.classList.remove('hidden');
                }
            } catch (error) {
                console.error(error);
                err.innerText = "Network Error";
                err.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
